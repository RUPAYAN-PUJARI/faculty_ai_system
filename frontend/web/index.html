<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPPIMT Campus Chatbot</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      :root {
        --bg: #0b1020;
        --surface: rgba(20, 24, 40, 0.72);
        --surface-strong: rgba(26, 32, 53, 0.92);
        --border: rgba(255, 255, 255, 0.08);

        --primary: #7c4dff;
        --primary-light: #9d7bff;
        --secondary: #00d4ff;

        --text: #f8fafc;
        --muted: #94a3b8;

        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.2);

        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 18px;

        font-family: "Inter", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        overflow-x: hidden;
        background:
          radial-gradient(circle at top left, #312e81 0%, transparent 30%),
          radial-gradient(circle at top right, #0ea5e9 0%, transparent 25%),
          radial-gradient(circle at bottom, #111827 0%, #050816 70%);
        background-color: var(--bg);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        backdrop-filter: blur(80px);
        pointer-events: none;
      }

      .container {
        max-width: 1250px;
        margin: auto;
        padding: 40px 24px 140px;
        position: relative;
        z-index: 1;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        gap: 20px;
      }

      .headline {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        box-shadow:
          0 8px 24px rgba(124, 77, 255, 0.25),
          inset 0 1px 1px rgba(255, 255, 255, 0.12);

        overflow: hidden;
      }

      .logo img {
        width: 80%;
        height: 80%;
        object-fit: contain;
      }
      h1 {
        margin: 0;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -1px;
      }

      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 15px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;

        padding: 10px 16px;

        border-radius: 999px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(16px);

        font-size: 13px;
        font-weight: 600;

        color: #e2e8f0;
      }

      .clear-chat {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: white;

        padding: 12px 18px;

        border-radius: 16px;

        cursor: pointer;

        transition: all 0.25s ease;
      }

      .clear-chat:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
      }

      .chat-shell {
        display: grid;
        grid-template-columns: 1.5fr 0.6fr;
        gap: 24px;
      }

      .chat-panel,
      .card {
        background: var(--surface);

        border: 1px solid var(--border);

        backdrop-filter: blur(24px);

        border-radius: var(--radius-xl);

        box-shadow: var(--shadow);
      }

      .chat-panel {
        padding: 24px;
        min-height: 600px;

        display: flex;
        flex-direction: column;
        gap: 18px;

        overflow-y: auto;
        overflow-x: clip;
      }

      .card {
        padding: 24px;
      }

      .empty-chat {
        margin: auto;
        text-align: center;
        color: var(--muted);
        font-size: 15px;
      }

      .chat-message {
        display: flex;
        animation: fadeUp 0.3s ease;
      }

      .chat-message.user {
        justify-content: flex-end;
      }

      .chat-message.assistant {
        justify-content: flex-start;
        width: 100%;
      }

      .bubble {
        max-width: 76%;

        padding: 16px 18px;

        border-radius: 24px;

        line-height: 1.6;

        font-size: 15px;

        box-shadow: var(--shadow);

        transition: transform 0.2s ease;
        overflow-wrap: anywhere;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .bubble:hover {
        transform: translateY(-2px);
      }

      .chat-message.user .bubble {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );

        color: white;

        border-bottom-right-radius: 8px;
      }

      .chat-message.assistant .bubble {
        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: #f1f5f9;

        border-bottom-left-radius: 8px;
        width: 100%;
        max-width: 100%;
        flex: 1;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0;
      }

      .chat-results {
        display: grid;
        gap: 16px;
        margin-top: 16px;
        width: 100%;
        overflow: hidden;
        min-width: 0;
      }

      .chat-results > div {
        min-width: 0;
      }

      .result {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 18px;

        padding: 16px;

        border-radius: 20px;

        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.06);

        transition: all 0.25s ease;
      }

      .result--placement,
      .result--scholarship {
        grid-template-columns: 140px 1fr;
      }

      .result-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;

        padding: 14px;
        border-radius: 16px;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);

        font-size: 13px;
        font-weight: 700;
        color: #e2e8f0;
        text-align: center;
      }

      .result--placement .result-icon {
        background: rgba(124, 77, 255, 0.18);
        border-color: rgba(124, 77, 255, 0.35);
      }

      .result--scholarship .result-icon {
        background: rgba(0, 212, 255, 0.18);
        border-color: rgba(0, 212, 255, 0.35);
      }

      .result-icon i {
        font-size: 26px;
        color: #f8fafc;
      }

      .result-body {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .result-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .result-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .result-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;

        padding: 4px 10px;
        border-radius: 999px;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);

        font-size: 12px;
        color: #cbd5e1;
      }

      .result:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.08);
      }

      .result img {
        width: 110px;
        height: 130px;

        object-fit: cover;

        border-radius: 16px;
      }
      .result-link {
        color: #93c5fd;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .result-link:hover {
        text-decoration: underline;
      }

      .placement-table-wrap {
        width: 100%;
        overflow-x: auto;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 18, 30, 0.6);
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.3) rgba(255, 255, 255, 0.05);
      }

      .placement-table-wrap::-webkit-scrollbar {
        height: 6px;
      }

      .placement-table-wrap::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 0 0 18px 18px;
      }

      .placement-table-wrap::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }

      .placement-table-wrap::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      .placement-more {
        margin-top: 12px;
        border: none;
        background: rgba(124, 77, 255, 0.2);
        color: #f8fafc;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .placement-more:hover {
        background: rgba(124, 77, 255, 0.35);
        transform: translateY(-1px);
      }

      .placement-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      .placement-table th,
      .placement-table td {
        padding: 12px 14px;
        text-align: left;
        font-size: 13px;
        color: #e2e8f0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        white-space: nowrap;
        word-break: normal;
        overflow-wrap: normal;
      }

      .placement-table th {
        position: sticky;
        top: 0;
        background: rgba(24, 28, 46, 0.95);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 11px;
      }

      .placement-table tr:hover td {
        background: rgba(255, 255, 255, 0.04);
      }

      .scholarship-grid {
        display: grid;
        gap: 18px;
      }

      .web-grid {
        display: grid;
        gap: 16px;
        min-width: 0;
        overflow: hidden;
      }

      .web-card {
        display: grid;
        gap: 10px;
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0;
      }

      .web-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .web-card h3 {
        margin: 0;
        font-size: 18px;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0;
      }

      .web-snippet {
        margin: 0;
        color: #cbd5e1;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .web-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .scholarship-card {
        display: grid;
        gap: 18px;
        padding: 20px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shadow);
      }

      .scholarship-header-row {
        display: flex;
        gap: 18px;
        align-items: flex-start;
      }

      .scholarship-media {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        border-radius: 18px;
        background: rgba(15, 18, 30, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 140px;
        height: 140px;
        flex: 0 0 140px;
      }

      .scholarship-media img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px;
        max-width: 100%;
        max-height: 100%;
      }

      .scholarship-placeholder {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.08);
      }

      .scholarship-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid rgba(0, 212, 255, 0.4);
        color: #e2e8f0;
        white-space: nowrap;
      }

      .scholarship-content {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .scholarship-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .scholarship-title-row h3 {
        margin: 0;
        font-size: 22px;
      }

      .scholarship-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .scholarship-provider {
        font-weight: 600;
        color: #e2e8f0;
      }

      .scholarship-overview {
        color: #cbd5e1;
      }

      .scholarship-toggle {
        align-self: flex-start;
        border: none;
        background: rgba(124, 77, 255, 0.2);
        color: #f8fafc;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .scholarship-toggle:hover {
        background: rgba(124, 77, 255, 0.35);
        transform: translateY(-1px);
      }

      .scholarship-details {
        margin-top: 8px;
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(15, 18, 30, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .detail-row,
      .detail-block {
        display: grid;
        gap: 6px;
      }

      .detail-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #94a3b8;
      }

      .detail-value {
        color: #e2e8f0;
        font-size: 14px;
      }

      .detail-list {
        margin: 0;
        padding-left: 18px;
        color: #e2e8f0;
        font-size: 14px;
      }

      .result h3 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .result p {
        margin: 6px 0;
        color: #cbd5e1;
      }

      .tips {
        padding: 0;
        margin: 18px 0 0;
        list-style: none;

        display: grid;
        gap: 14px;
      }

      .tips li {
        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.06);

        padding: 14px;

        border-radius: 18px;

        color: #cbd5e1;
      }

      .search-bar {
        position: fixed;

        left: 50%;
        bottom: 24px;

        transform: translateX(-50%);

        width: min(1200px, calc(100% - 24px));

        z-index: 50;

        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 14px;

        padding: 16px;

        border-radius: 30px;

        background: rgba(15, 18, 30, 0.75);

        backdrop-filter: blur(30px);

        border: 1px solid rgba(255, 255, 255, 0.08);

        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.4),
          inset 0 1px 1px rgba(255, 255, 255, 0.05);
      }

      .search-input {
        display: flex;
        align-items: center;
        gap: 12px;

        background: rgba(255, 255, 255, 0.05);

        border-radius: 20px;

        padding: 14px 16px;

        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .search-input i {
        color: #94a3b8;
        font-size: 18px;
      }

      .search-input input {
        width: 100%;

        border: none;
        outline: none;
        background: transparent;

        color: white;

        font-size: 15px;
      }

      .search-input input::placeholder {
        color: #94a3b8;
      }

      .search-file {
        display: inline-flex;
        align-items: center;
        gap: 8px;

        background: rgba(124, 77, 255, 0.2);

        border: 1px solid rgba(124, 77, 255, 0.4);

        color: white;

        padding: 8px 12px;

        border-radius: 999px;

        font-size: 12px;
      }

      .chip-close {
        border: none;
        background: transparent;
        color: white;
        cursor: pointer;
      }

      .upload-btn,
      button.primary {
        height: 58px;

        border: none;

        border-radius: 20px;

        padding: 0 22px;

        cursor: pointer;

        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;

        font-size: 15px;
        font-weight: 700;

        transition: all 0.25s ease;
      }

      .upload-btn {
        width: 58px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: white;
      }

      .upload-btn:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
      }

      .upload-btn input {
        display: none;
      }

      .upload-plus {
        font-size: 26px;
        font-weight: 500;
      }

      button.primary {
        background: linear-gradient(135deg, var(--primary), var(--secondary));

        color: white;

        min-width: 140px;

        box-shadow: 0 10px 24px rgba(124, 77, 255, 0.35);
      }

      button.primary:hover {
        transform: translateY(-3px) scale(1.02);
      }

      .status {
        margin-top: 14px;
        color: #cbd5e1;
        text-align: center;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .chat-shell {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 28px;
        }

        .search-bar {
          grid-template-columns: 1fr;
          border-radius: 24px;
        }

        .upload-btn,
        button.primary {
          width: 100%;
        }

        .bubble {
          max-width: 92%;
        }

        .result {
          grid-template-columns: 1fr;
        }

        .result--placement,
        .result--scholarship {
          grid-template-columns: 1fr;
        }

        .result-icon {
          flex-direction: row;
          justify-content: flex-start;
        }

        .result img {
          width: 100%;
          height: 260px;
        }

        .scholarship-header-row {
          flex-direction: column;
        }

        .scholarship-media {
          width: 100%;
          height: 160px;
          flex: 0 0 auto;
        }

        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
      .chat-side {
        position: relative;
      }

      .side-fixed {
        position: sticky;
        top: 24px;

        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .fixed-clear {
        width: 100%;
        justify-content: center;

        height: 56px;

        border-radius: 18px;

        font-size: 14px;
        font-weight: 700;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(18px);

        transition: all 0.25s ease;
      }

      .fixed-clear:hover {
        transform: translateY(-2px);

        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
